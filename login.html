    <div class="registration-page">
      <div class="container">
          <div class="registration-form-wrapper">
              <h2>Вход</h2>
              <form id="registration-form">

                  <label for="reg-email">Email:</label>
                  <input type="email" id="reg-email" name="email" required placeholder="Введите ваш email">

                  <label for="reg-username">Логин:</label>
                  <input type="text" id="reg-username" name="username" required placeholder="Введите логин">

                  <label for="reg-password">Пароль:</label>
                  <input type="password" id="reg-password" name="password" required placeholder="Введите пароль">

                  <button type="submit" class="btn btn-register-submit">Вход</button>
              </form>
              <p class="registration-footer">Вы ещё не зарегистрированы? <a href="register.html">Зарегистрируйтесь</a></p>
